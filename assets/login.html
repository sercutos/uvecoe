<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
  <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1976d2;
      font-family: 'Roboto', sans-serif;
    }
    .login-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
    }
  </style>
</head>
<body>
  <div class="login-card mdl-shadow--2dp">
    <h4>Iniciar sesión</h4>
    <form id="loginForm">
      <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
        <input class="mdl-textfield__input" type="text" id="username" required>
        <label class="mdl-textfield__label" for="username">Usuario</label>
      </div>
      <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
        <input class="mdl-textfield__input" type="password" id="password" required>
        <label class="mdl-textfield__label" for="password">Contraseña</label>
      </div>
      <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">
        Entrar
      </button>
    </form>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const success = await ipcRenderer.invoke('login', { username, password });
      if (!success) alert('Usuario o contraseña incorrectos');
    });
  </script>
</body>
</html>
